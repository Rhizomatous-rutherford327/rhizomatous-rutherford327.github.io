name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A20A6E: ${{ secrets.A20A6E }}
          BE8350: ${{ secrets.BE8350 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A20A6E', '')
          k2 = os.environ.get('BE8350', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- cc2721d1d66323594c086366f8f0c81452f1 -->', k1) if k1 else txt
          out = out.replace('<!-- 0464431fc5ceb7dca36ee8f73368175146dc -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
